<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Shadow Lantern</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">

    <!-- PWA: Makes Chrome Android hide URL bar when launched from home screen -->
    <link rel="manifest" href="manifest.json">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#000000">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #start-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 32px;
            padding: 40px;
            text-align: center;
        }

        #game-title {
            font-family: Georgia, serif;
            font-size: 36px;
            color: #ffeeaa;
            text-shadow: 0 0 30px rgba(255, 220, 80, 0.8);
            letter-spacing: 4px;
        }

        /* Shown only if NOT running as installed PWA */
        #install-hint {
            display: none;
            background: rgba(255, 238, 170, 0.08);
            border: 1px solid rgba(255, 238, 170, 0.25);
            border-radius: 16px;
            padding: 16px 20px;
            color: #ffeeaa;
            font-family: sans-serif;
            font-size: 14px;
            line-height: 1.7;
            max-width: 300px;
        }

        #install-hint strong {
            display: block;
            font-size: 15px;
            margin-bottom: 4px;
        }

        #btn-fullscreen {
            padding: 20px 40px;
            font-size: 24px;
            font-weight: bold;
            color: #000;
            background: #ffeeaa;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            z-index: 100;
            box-shadow: 0 0 20px rgba(255, 238, 170, 0.5);
        }

        canvas {
            display: none;
            width: 100vw;
            height: 100vh;
            touch-action: none;
        }
    </style>
</head>
<body>

    <div id="start-screen">
        <div id="game-title">🕯 SHADOW NUMM...</div>

        <!-- This hint only shows when NOT installed as a PWA -->
        <div id="install-hint">
            <strong>🔆 Fullscreen</strong>
            kopi kopi → <em>"kopi ....kopi Num"</em> → Masukkan yang berikutnya Num... Bius Angin
        </div>

        <button id="btn-fullscreen">START GAME</button>
    </div>

    <canvas id="gameCanvas"></canvas>

<script>
    const btn = document.getElementById('btn-fullscreen');
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const startScreen = document.getElementById('start-screen');
    const installHint = document.getElementById('install-hint');

    let player = { x: 0, y: 0 };
    let gameStarted = false;

    // Check if running as installed PWA (fullscreen display mode)
    // If NOT installed, show the hint to guide the user
    const isInstalledPWA = window.matchMedia('(display-mode: fullscreen)').matches
                        || window.matchMedia('(display-mode: standalone)').matches
                        || window.navigator.standalone === true;

    if (!isInstalledPWA) {
        installHint.style.display = 'block';
    }

    // --- FULLSCREEN FUNCTION ---
    function start() {
        // Try requestFullscreen anyway — works on some browsers/devices
        const doc = document.documentElement;
        if (doc.requestFullscreen) {
            doc.requestFullscreen().catch(() => {});
        } else if (doc.webkitRequestFullscreen) {
            doc.webkitRequestFullscreen();
        }

        startScreen.style.display = 'none';
        canvas.style.display = 'block';

        gameStarted = true;
        resize();
        draw();
    }

    // --- SETUP & INPUT ---
    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }

    function handleInput(e) {
        if (!gameStarted) return;
        if (e.cancelable) e.preventDefault();

        const touch = e.touches ? e.touches[0] : e;
        player.x = touch.clientX;
        player.y = touch.clientY;
    }

    btn.addEventListener('click', start);
    btn.addEventListener('touchstart', (e) => { e.preventDefault(); start(); });

    window.addEventListener('resize', resize);
    window.addEventListener('touchmove', handleInput, { passive: false });
    window.addEventListener('mousemove', handleInput);

    // --- DRAW LOOP ---
    function draw() {
        if (!gameStarted) return;

        ctx.fillStyle = "black";
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // Torch Glow
        let radius = 200;
        let grad = ctx.createRadialGradient(player.x, player.y, 0, player.x, player.y, radius);
        grad.addColorStop(0, 'rgba(255, 230, 100, 0.4)');
        grad.addColorStop(1, 'rgba(0, 0, 0, 0)');

        ctx.fillStyle = grad;
        ctx.beginPath();
        ctx.arc(player.x, player.y, radius, 0, Math.PI * 2);
        ctx.fill();

        // Player
        ctx.fillStyle = "#fff";
        ctx.beginPath();
        ctx.arc(player.x, player.y, 6, 0, Math.PI * 2);
        ctx.fill();

        requestAnimationFrame(draw);
    }

    player.x = window.innerWidth / 2;
    player.y = window.innerHeight / 2;
</script>
</body>
</html>
