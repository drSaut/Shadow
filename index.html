<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Shadow Lantern</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <style>
        /* CSS: Resets and Full Screen Layout */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body, html { 
            width: 100%; 
            height: 100%; 
            overflow: hidden; 
            background: #000; 
            position: fixed; /* Fixes the body to prevent "pull-to-refresh" */
        }

        canvas { 
            display: block; 
            width: 100vw; 
            height: 100vh; 
            touch-action: none; /* Disables browser gestures so game handles touch */
        }
    </style>
</head>
<body>

    <canvas id="gameCanvas"></canvas>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    let player = { x: 0, y: 0 };
    let hasInteracted = false;

    // --- FULLSCREEN FUNCTION ---
    // This hides the URL bar. Browsers ONLY allow this after a user touch.
    function goImmersive() {
        if (!hasInteracted) {
            const doc = document.documentElement;
            if (doc.requestFullscreen) {
                doc.requestFullscreen();
            } else if (doc.webkitRequestFullscreen) { /* Chrome & Safari Mobile */
                doc.webkitRequestFullscreen();
            }
            hasInteracted = true;
        }
    }

    // --- SETUP & RESIZE ---
    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }

    // --- INPUT HANDLING ---
    function handleInput(e) {
        // 1. Try to go fullscreen on first touch
        goImmersive();

        // 2. Prevent the browser from scrolling/bouncing
        if (e.cancelable) e.preventDefault();

        // 3. Get touch or mouse coordinates
        const touch = e.touches ? e.touches[0] : e;
        player.x = touch.clientX;
        player.y = touch.clientY;
    }

    // Listeners for mobile touch and desktop mouse
    window.addEventListener('resize', resize);
    window.addEventListener('touchstart', handleInput, { passive: false });
    window.addEventListener('touchmove', handleInput, { passive: false });
    window.addEventListener('mousemove', handleInput);

    // --- GAME DRAWING LOOP ---
    function draw() {
        // Clear screen with black
        ctx.fillStyle = "black";
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // Draw Soft Yellow Torch Light
        let radius = 180;
        let grad = ctx.createRadialGradient(player.x, player.y, 0, player.x, player.y, radius);
        grad.addColorStop(0, 'rgba(255, 225, 100, 0.45)'); // Inner soft glow
        grad.addColorStop(1, 'rgba(0, 0, 0, 0)');           // Fade to black

        ctx.fillStyle = grad;
        ctx.beginPath();
        ctx.arc(player.x, player.y, radius, 0, Math.PI * 2);
        ctx.fill();

        // Draw Player Core
        ctx.fillStyle = "#ffffff";
        ctx.beginPath();
        ctx.arc(player.x, player.y, 6, 0, Math.PI * 2);
        ctx.fill();

        requestAnimationFrame(draw);
    }

    // Initialize
    resize();
    // Center player at start
    player.x = canvas.width / 2;
    player.y = canvas.height / 2;
    draw();
</script>
</body>
</html>
