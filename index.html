<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Shadow Lantern</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body, html { 
            width: 100%; 
            height: 100%; 
            overflow: hidden; 
            background: #000; 
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* The Play Button Styling */
        #btn-fullscreen {
            padding: 20px 40px;
            font-size: 24px;
            font-weight: bold;
            color: #000;
            background: #ffeeaa;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            z-index: 100;
            box-shadow: 0 0 20px rgba(255, 238, 170, 0.5);
        }

        canvas { 
            display: none; /* Hidden until button is pressed */
            width: 100vw; 
            height: 100vh; 
            touch-action: none;
        }
    </style>
</head>
<body>

    <button id="btn-fullscreen">START FULLSCREEN</button>
    <canvas id="gameCanvas"></canvas>

<script>
    const btn = document.getElementById('btn-fullscreen');
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    let player = { x: 0, y: 0 };
    let gameStarted = false;

    // --- FULLSCREEN FUNCTION ---
    function start() {
        // Request fullscreen mode
        const doc = document.documentElement;
        if (doc.requestFullscreen) {
            doc.requestFullscreen();
        } else if (doc.webkitRequestFullscreen) {
            doc.webkitRequestFullscreen();
        }

        // Hide button, show canvas
        btn.style.display = 'none';
        canvas.style.display = 'block';
        
        gameStarted = true;
        resize();
        
        // Start drawing
        draw();
    }

    // --- SETUP & INPUT ---
    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }

    function handleInput(e) {
        if (!gameStarted) return;
        if (e.cancelable) e.preventDefault();

        const touch = e.touches ? e.touches[0] : e;
        player.x = touch.clientX;
        player.y = touch.clientY;
    }

    // Button Listener
    btn.addEventListener('click', start);
    btn.addEventListener('touchstart', (e) => {
        e.preventDefault();
        start();
    });

    window.addEventListener('resize', resize);
    window.addEventListener('touchmove', handleInput, { passive: false });
    window.addEventListener('mousemove', handleInput);

    // --- DRAW LOOP ---
    function draw() {
        if (!gameStarted) return;

        ctx.fillStyle = "black";
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // Torch Glow
        let radius = 200;
        let grad = ctx.createRadialGradient(player.x, player.y, 0, player.x, player.y, radius);
        grad.addColorStop(0, 'rgba(255, 230, 100, 0.4)');
        grad.addColorStop(1, 'rgba(0, 0, 0, 0)');

        ctx.fillStyle = grad;
        ctx.beginPath();
        ctx.arc(player.x, player.y, radius, 0, Math.PI * 2);
        ctx.fill();

        // Player
        ctx.fillStyle = "#fff";
        ctx.beginPath();
        ctx.arc(player.x, player.y, 6, 0, Math.PI * 2);
        ctx.fill();

        requestAnimationFrame(draw);
    }

    // Set initial position
    player.x = window.innerWidth / 2;
    player.y = window.innerHeight / 2;
</script>
</body>
</html>
