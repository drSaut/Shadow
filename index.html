<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Shadow Hanum</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { width: 100%; height: 100%; overflow: hidden; background: #000; position: fixed; font-family: 'Courier New', monospace; }
        
        #ui { position: absolute; top: 20px; left: 20px; color: #fff; z-index: 10; pointer-events: none; }
        #countdown { 
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            color: #ffeeaa; font-size: 80px; z-index: 5; pointer-events: none;
        }

        #splash-screen, #game-over {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 1000; text-align: center;
        }

        h1 { color: #ffeeaa; font-size: 32px; margin-bottom: 10px; }
        .instr { color: #888; font-size: 14px; margin-bottom: 20px; padding: 0 20px; }
        #splash-img { max-width: 50%; border-radius: 10px; margin-bottom: 20px; image-rendering: pixelated; }
        
        .btn { 
            background: #ffeeaa; color: #000; padding: 20px 40px; 
            font-size: 22px; font-weight: bold; border-radius: 50px;
            cursor: pointer; z-index: 2000; border: none;
            touch-action: manipulation;
        }

        canvas { display: none; width: 100vw; height: 100vh; touch-action: none; }
    </style>
</head>
<body>

    <div id="ui">
        <div>Score: <span id="scoreVal">0</span></div>
        <div>Lives: <span id="livesVal">3</span></div>
        <div>Level: <span id="levelVal">1</span></div>
    </div>

    <div id="countdown"></div>

    <div id="splash-screen">
        <h1>SHADOW HANUM</h1>
        <img id="splash-img" src="splash.png">
        <p class="instr">Hindari kotak Merah <br>Jangan sampai Mati 10 detik, akan naik ke level selanjutnya.. </br>
        
</p>
        <button class="btn" id="startBtn">START GAME</button>
    </div>

    <div id="game-over" style="display:none">
        <h1 style="color:red">GAME OVER</h1>
        <p style="color:white; margin-bottom: 20px;">Final Score: <span id="finalScore">0</span></p>
        <button class="btn" onclick="location.reload()">RETRY</button>
    </div>

    <canvas id="gameCanvas"></canvas>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const startBtn = document.getElementById('startBtn');
    const countdownEl = document.getElementById('countdown');
    
    let score = 0, lives = 3, level = 1;
    let gameActive = false, dangerActive = false;
    let player = { x: 0, y: 0, radius: 8 };
    let obstacles = [];

    function startGame() {
        if (gameActive) return;
        const doc = document.documentElement;
        if (doc.requestFullscreen) doc.requestFullscreen();
        else if (doc.webkitRequestFullscreen) doc.webkitRequestFullscreen();

        document.getElementById('splash-screen').style.display = 'none';
        canvas.style.display = 'block';
        gameActive = true;
        resize();
        
        player.x = canvas.width / 2;
        player.y = canvas.height / 2;

        gameLoop();
        runSafeStart();
    }

    startBtn.addEventListener('click', startGame);
    startBtn.addEventListener('touchstart', (e) => {
        e.preventDefault();
        startGame();
    });

    function runSafeStart() {
        let count = 5;
        countdownEl.innerText = count;
        let interval = setInterval(() => {
            count--;
            if (count > 0) countdownEl.innerText = count;
            else {
                clearInterval(interval);
                countdownEl.innerText = "GO!";
                setTimeout(() => { 
                    countdownEl.innerText = ""; 
                    dangerActive = true; 
                    spawnObstacle();
                    startLevelTimer();
                }, 1000);
            }
        }, 1000);
    }

    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }

    function handleInput(e) {
        if (!gameActive) return;
        const touch = e.touches ? e.touches[0] : e;
        player.x = touch.clientX;
        player.y = touch.clientY - 80;
    }

    window.addEventListener('touchmove', handleInput, {passive:false});
    window.addEventListener('mousemove', handleInput);

    function spawnObstacle() {
        if (!gameActive || !dangerActive) return;
        
        let obj = {
            x: 0, y: 0, size: 20 + Math.random() * 15,
            speedX: 0, speedY: 0
        };

        let moveSpeed = 2 + (level * 0.4);
        let randomDirection = Math.random();

        // LOGIC FOR DIRECTIONS BASED ON LEVEL
        if (level >= 8 && randomDirection < 0.25) { 
            // FROM BELOW TO UP
            obj.x = Math.random() * (canvas.width - 20);
            obj.y = canvas.height + 30;
            obj.speedY = -moveSpeed;
        } else if (level >= 5 && randomDirection < 0.5) { 
            // FROM RIGHT TO LEFT
            obj.x = canvas.width + 30;
            obj.y = Math.random() * canvas.height;
            obj.speedX = -moveSpeed;
        } else if (level >= 2 && randomDirection < 0.75) { 
            // FROM LEFT TO RIGHT
            obj.x = -30;
            obj.y = Math.random() * canvas.height;
            obj.speedX = moveSpeed;
        } else { 
            // DEFAULT: FROM TOP TO DOWN
            obj.x = Math.random() * (canvas.width - 20);
            obj.y = -30;
            obj.speedY = moveSpeed;
        }

        obstacles.push(obj);
        // Spawning gets faster as level increases
        setTimeout(spawnObstacle, 1000 / (0.8 + level * 0.1));
    }

    function startLevelTimer() {
        setInterval(() => {
            if (gameActive) {
                level++;
                document.getElementById('levelVal').innerText = level;
            }
        }, 10000);
    }

    function gameLoop() {
        if (!gameActive) return;
        
        ctx.fillStyle = "black";
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // Player Light
        let grad = ctx.createRadialGradient(player.x, player.y, 0, player.x, player.y, 160);
        grad.addColorStop(0, 'rgba(255, 230, 100, 0.4)');
        grad.addColorStop(1, 'rgba(0,0,0,0)');
        ctx.fillStyle = grad;
        ctx.beginPath(); ctx.arc(player.x, player.y, 160, 0, Math.PI*2); ctx.fill();

        ctx.fillStyle = "#fff";
        ctx.beginPath(); ctx.arc(player.x, player.y, player.radius, 0, Math.PI*2); ctx.fill();

        // Obstacles
        for (let i = obstacles.length - 1; i >= 0; i--) {
            let o = obstacles[i];
            o.x += o.speedX; 
            o.y += o.speedY;

            let obstacleGlow = o.size * 2.5;
            let centerX = o.x + o.size / 2;
            let centerY = o.y + o.size / 2;

            let redGrad = ctx.createRadialGradient(centerX, centerY, 0, centerX, centerY, obstacleGlow);
            redGrad.addColorStop(0, 'rgba(255, 0, 0, 0.4)'); 
            redGrad.addColorStop(1, 'rgba(0, 0, 0, 0)');     

            ctx.fillStyle = redGrad;
            ctx.beginPath(); ctx.arc(centerX, centerY, obstacleGlow, 0, Math.PI * 2); ctx.fill();

            ctx.fillStyle = "red";
            ctx.fillRect(o.x, o.y, o.size, o.size);

            let dx = player.x - centerX;
            let dy = player.y - centerY;
            let dist = Math.sqrt(dx*dx + dy*dy);

            if (dist < player.radius + (o.size/2)) {
                obstacles.splice(i, 1);
                lives--;
                document.getElementById('livesVal').innerText = lives;
                if (lives <= 0) {
                    gameActive = false;
                    document.getElementById('finalScore').innerText = score;
                    document.getElementById('game-over').style.display = 'flex';
                }
            }
            
            // Cleanup: Remove if far outside any screen edge
            if (o.y > canvas.height + 100 || o.y < -100 || o.x > canvas.width + 100 || o.x < -100) {
                obstacles.splice(i, 1);
                score += 10;
                document.getElementById('scoreVal').innerText = score;
            }
        }
        requestAnimationFrame(gameLoop);
    }

    window.addEventListener('resize', resize);
    resize();
</script>
</body>
</html>
