<!DOCTYPE html>
<html>
<head>
    <title>Shadow Lantern</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <style>
        /* This ensures no scrollbars and full black background */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { 
            width: 100%; 
            height: 100%; 
            overflow: hidden; 
            background: #000; 
            position: fixed; /* Prevents "pull-to-refresh" on mobile */
        }
        canvas { 
            display: block; 
            width: 100vw; 
            height: 100vh; 
            touch-action: none; 
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    let player = { x: 0, y: 0 };

    // This function stretches the "paper" to the exact size of the window
    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }

    function handleMove(e) {
        e.preventDefault();
        const touch = e.touches ? e.touches[0] : e;
        player.x = touch.clientX;
        player.y = touch.clientY;
    }

    window.addEventListener('resize', resize);
    window.addEventListener('mousemove', handleMove);
    window.addEventListener('touchstart', handleMove, { passive: false });
    window.addEventListener('touchmove', handleMove, { passive: false });

    function draw() {
        ctx.fillStyle = "black";
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // Soft Yellow Light
        let radius = 180;
        let grad = ctx.createRadialGradient(player.x, player.y, 0, player.x, player.y, radius);
        grad.addColorStop(0, 'rgba(255, 220, 100, 0.4)');
        grad.addColorStop(1, 'rgba(0, 0, 0, 0)');

        ctx.fillStyle = grad;
        ctx.beginPath();
        ctx.arc(player.x, player.y, radius, 0, Math.PI * 2);
        ctx.fill();

        // White Player Core
        ctx.fillStyle = "#fff";
        ctx.beginPath();
        ctx.arc(player.x, player.y, 6, 0, Math.PI * 2);
        ctx.fill();

        requestAnimationFrame(draw);
    }

    // Start
    resize();
    // Center player initially
    player.x = canvas.width / 2;
    player.y = canvas.height / 2;
    draw();
    // Tap the screen once to trigger full screen
window.addEventListener('touchstart', function() {
    if (!document.fullscreenElement) {
        document.documentElement.requestFullscreen();
    }
}, { once: true }); // This only runs the first time you touch

</script>
</body>
</html>
