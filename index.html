<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Kopiii Hanum - Pro Leaderboard</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { width: 100%; height: 100%; overflow: hidden; background: #000; position: fixed; font-family: 'Courier New', monospace; }
        
        #ui-container {
            position: absolute; top: 10px; left: 0; width: 100%;
            display: flex; justify-content: space-around; align-items: flex-start;
            pointer-events: none; z-index: 100;
        }

        .hud-box {
            background: rgba(0, 0, 0, 0.9);
            border: 2px solid #ffeeaa;
            padding: 8px 15px; color: #fff; text-align: center;
            min-width: 90px; border-radius: 4px;
            box-shadow: 0 0 25px #ffaa00;
        }

        .label { font-size: 10px; color: #ffeeaa; display: block; margin-bottom: 2px; font-weight: bold; }
        .value { font-size: 18px; font-weight: bold; }

        #splash-screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: #000 url('Splash.jpg') no-repeat center center;
            background-size: cover;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            z-index: 1000; text-align: center;
        }

        .overlay {
            background: rgba(0, 0, 0, 0.75);
            padding: 25px; border-radius: 15px;
            border: 3px solid #ffeeaa;
            backdrop-filter: blur(4px);
            box-shadow: 0 0 50px rgba(255, 238, 170, 0.5);
            width: 85%; max-width: 400px;
        }

        h1 { color: #ffeeaa; font-size: 28px; margin-bottom: 10px; letter-spacing: 3px; text-shadow: 0 0 15px #ffaa00; }
        
        #nameInput {
            width: 100%; padding: 12px; margin-bottom: 15px;
            background: #222; border: 2px solid #ffeeaa;
            color: #fff; text-align: center; font-family: inherit; font-size: 16px;
        }

        .leaderboard-ui {
            margin: 15px 0; padding: 10px; border-top: 1px solid #444;
            color: #ffeeaa; font-size: 12px; text-align: left;
        }
        .leaderboard-ui h3 { text-align: center; margin-bottom: 5px; text-decoration: underline; }
        .leaderboard-ui ul { list-style: none; }
        .leaderboard-ui li { display: flex; justify-content: space-between; margin-bottom: 3px; }

        .btn { 
            background: #ffeeaa; color: #000; padding: 15px 40px; 
            font-size: 20px; font-weight: bold; border-radius: 50px;
            cursor: pointer; border: none; box-shadow: 0 0 20px #ffeeaa;
            touch-action: manipulation; width: 100%;
        }

        #game-over {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); display: none; flex-direction: column;
            justify-content: center; align-items: center; z-index: 2000; text-align: center;
        }

        canvas { display: none; width: 100vw; height: 100vh; touch-action: none; }
        #countdown { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #ffeeaa; font-size: 80px; z-index: 5; pointer-events: none; text-shadow: 0 0 30px #ffaa00; }
    </style>
</head>
<body>

    <div id="ui-container">
        <div class="hud-box"><span class="label">SCORE</span><span id="scoreVal" class="value">0</span></div>
        <div id="levelBox" class="hud-box"><span class="label">LEVEL</span><span id="levelVal" class="value">1</span></div>
        <div id="livesBox" class="hud-box"><span class="label">LIVES</span><span id="livesVal" class="value">3</span></div>
    </div>

    <div id="countdown"></div>

    <div id="splash-screen">
        <div class="overlay">
            <h1>KOPIII HANUM</h1>
            
            <input type="text" id="nameInput" placeholder="MASUKKAN NAMA" maxlength="12">

            <div class="leaderboard-ui">
                <h3>TOP 5 HIGH SCORES</h3>
                <ul id="scoreList"><li>Loading...</li></ul>
            </div>

            <button class="btn" id="startBtn">START GAME</button>
        </div>
    </div>

    <div id="game-over">
        <h1 style="color:red; text-shadow: 0 0 20px red; font-size: 48px; margin-bottom: 10px;">GAME OVER</h1>
        <p style="color:white; font-size: 24px; margin-bottom: 10px;">Skor Kamu: <span id="finalScore">0</span></p>
        <p id="savingMsg" style="color:#ffeeaa; font-size: 14px; margin-bottom: 20px;">Menyimpan skor...</p>
        <button class="btn" onclick="location.reload()">RETRY</button>
    </div>

    <canvas id="gameCanvas"></canvas>

<script>
    // --- Leaderboard Config ---
    const BIN_ID = '69ed6df6aaba8821973a4a62'; // REPLACE ME
    const MASTER_KEY = '$2a$10$QChwMTCQtDVfv716e69jFOsHGiGRoA7yRIq38Jn6ChU9NJ.bAbXWW'; // REPLACE ME
    const JSONBIN_URL = `https://api.jsonbin.io/v3/b/${BIN_ID}`;

    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const startBtn = document.getElementById('startBtn');
    const countdownEl = document.getElementById('countdown');
    
    let score = 0, lives = 3, level = 1, totalSeconds = 0;
    let gameActive = false, dangerActive = false;
    let playerName = "Player";
    let player = { x: 0, y: 0, radius: 10, isShielded: false, shieldTimer: 0 };
    let obstacles = [], novas = [], fragments = [], bonuses = [], hunters = [];
    let novaSpawnedInThisLevel = false, pulseAngle = 0;
    let gameTimerInterval, animationFrameId;

    // --- Leaderboard Logic ---
    async function fetchScores() {
        try {
            const res = await fetch(`${JSONBIN_URL}/latest`, {
                headers: { 'X-Master-Key': MASTER_KEY }
            });
            const data = await res.json();
            displayScores(data.record.leaderboard || []);
        } catch (e) {
            document.getElementById('scoreList').innerHTML = "<li>Error loading scores</li>";
        }
    }

    function displayScores(list) {
        const listEl = document.getElementById('scoreList');
        if (list.length === 0) {
            listEl.innerHTML = "<li>Belum ada skor!</li>";
            return;
        }
        listEl.innerHTML = list
            .sort((a, b) => b.score - a.score)
            .slice(0, 5)
            .map((s, i) => `<li><span>${i+1}. ${s.name}</span> <span>${s.score}</span></li>`)
            .join('');
    }

    async function uploadScore(name, finalScore) {
        try {
            // Get current list
            const res = await fetch(`${JSONBIN_URL}/latest`, { headers: { 'X-Master-Key': MASTER_KEY } });
            const data = await res.json();
            let board = data.record.leaderboard || [];
            
            // Add new and sort
            board.push({ name, score: finalScore });
            board.sort((a, b) => b.score - a.score);
            board = board.slice(0, 10); // Keep top 10 in database

            // Save back
            await fetch(JSONBIN_URL, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json', 'X-Master-Key': MASTER_KEY },
                body: JSON.stringify({ leaderboard: board })
            });
            document.getElementById('savingMsg').innerText = "Skor Berhasil Disimpan!";
        } catch (e) {
            document.getElementById('savingMsg').innerText = "Gagal menyimpan skor.";
        }
    }

    // --- Game Logic ---
    window.onload = fetchScores;

    startBtn.addEventListener('click', () => {
        const input = document.getElementById('nameInput').value.trim();
        if(!input) { alert("Masukkan nama kamu dulu!"); return; }
        playerName = input;
        startGame();
    });

    function startGame() {
        if (gameActive) return;
        document.getElementById('splash-screen').style.display = 'none';
        canvas.style.display = 'block';
        gameActive = true;
        resize();
        player.x = canvas.width / 2;
        player.y = canvas.height / 2;
        gameLoop();
        runSafeStart();
    }

    function runSafeStart() {
        let count = 3;
        countdownEl.innerText = count;
        let interval = setInterval(() => {
            count--;
            if (count > 0) countdownEl.innerText = count;
            else {
                clearInterval(interval);
                countdownEl.innerText = "GO!";
                setTimeout(() => { 
                    countdownEl.innerText = ""; 
                    dangerActive = true; 
                    spawnObstacle(); 
                    startTimers(); 
                }, 800);
            }
        }, 1000);
    }

    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }

    function handleInput(e) {
        if (!gameActive) return;
        const touch = e.touches ? e.touches[0] : e;
        player.x = touch.clientX;
        player.y = touch.clientY - (e.touches ? 120 : 0);
    }

    window.addEventListener('touchmove', (e) => { e.preventDefault(); handleInput(e); }, {passive:false});
    window.addEventListener('mousemove', handleInput);

    function spawnObstacle() {
        if (!gameActive || !dangerActive) return;
        let speed = 2.5 + (level * 0.4);
        let o = { x: 0, y: 0, radius: 10 + Math.random()*8, vx: 0, vy: 0, pulseOffset: Math.random()*Math.PI*2 };
        let side = Math.floor(Math.random()*4);
        if (side === 0) { o.x = Math.random()*canvas.width; o.y = -30; o.vy = speed; }
        else if (side === 1) { o.x = canvas.width+30; o.y = Math.random()*canvas.height; o.vx = -speed; }
        else if (side === 2) { o.x = Math.random()*canvas.width; o.y = canvas.height+30; o.vy = -speed; }
        else { o.x = -30; o.y = Math.random()*canvas.height; o.vx = speed; }
        obstacles.push(o);
        setTimeout(spawnObstacle, 1000 / (0.8 + level * 0.15));
    }

    function spawnHunter() {
        if (!gameActive || level < 5) return;
        let side = Math.floor(Math.random()*4);
        let h = { x: 0, y: 0, radius: 28, timer: 8, speed: 0.8 + ((level-5) * 0.25), pulseOffset: Math.random()*Math.PI*2 };
        if (side === 0) { h.x = Math.random()*canvas.width; h.y = -50; }
        else if (side === 1) { h.x = canvas.width+50; h.y = Math.random()*canvas.height; }
        else if (side === 2) { h.x = Math.random()*canvas.width; h.y = canvas.height+50; }
        else { h.x = -50; h.y = Math.random()*canvas.height; }
        hunters.push(h);
    }

    function spawnBonus() {
        if (!gameActive) return;
        let b = { x: Math.random()*canvas.width, y: -20, radius: 12, vx: 0, vy: 2.2 };
        bonuses.push(b);
    }

    function spawnNova() {
        if (!gameActive || novaSpawnedInThisLevel) return;
        let n = { x: Math.random()*canvas.width, y: -20, radius: 15, targetX: canvas.width/2, targetY: canvas.height/2, speed: 1.5 + (level*0.2) };
        novas.push(n); novaSpawnedInThisLevel = true;
    }

    function startTimers() {
        gameTimerInterval = setInterval(() => {
            if (gameActive) {
                totalSeconds++;
                if (totalSeconds % 15 === 0) {
                    level++; novaSpawnedInThisLevel = false;
                    document.getElementById('levelVal').innerText = level;
                    if (level >= 3) spawnNova();
                }
                if (totalSeconds % 30 === 0) spawnHunter();
                if (totalSeconds % 20 === 0) spawnBonus();
                if (totalSeconds % 50 === 0) {
                    lives += 2; document.getElementById('livesVal').innerText = lives;
                }
                if (player.isShielded) { 
                    player.shieldTimer--; 
                    if (player.shieldTimer <= 0) player.isShielded = false; 
                }
                for(let h of hunters) h.timer--;
                hunters = hunters.filter(h => h.timer > 0);
            }
        }, 1000);
    }

    function gameLoop() {
        if (!gameActive) return;
        
        ctx.fillStyle = "black";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        pulseAngle += 0.08;

        let lanternRadius = 125; 
        let grad = ctx.createRadialGradient(player.x, player.y, 0, player.x, player.y, lanternRadius);
        
        if (player.isShielded) {
            grad.addColorStop(0, 'rgba(255, 215, 0, 0.7)');
            grad.addColorStop(1, 'rgba(0, 0, 0, 0)');
        } else {
            grad.addColorStop(0, 'rgba(255, 238, 170, 0.6)'); 
            grad.addColorStop(1, 'rgba(0, 0, 0, 0)');
        }
        
        ctx.fillStyle = grad;
        ctx.beginPath();
        ctx.arc(player.x, player.y, lanternRadius, 0, Math.PI*2);
        ctx.fill();

        ctx.shadowBlur = 15; ctx.shadowColor = "#fff";
        ctx.fillStyle = "#fff";
        ctx.beginPath(); ctx.arc(player.x, player.y, player.radius, 0, Math.PI*2); ctx.fill();
        ctx.shadowBlur = 0;

        if (player.isShielded) {
            ctx.strokeStyle = "#ffd700"; ctx.lineWidth = 3; ctx.beginPath();
            ctx.arc(player.x, player.y, player.radius + 15, 0, Math.PI * 2); ctx.stroke();
            ctx.fillStyle = "#ffd700";
            ctx.fillRect(player.x - 15, player.y + 25, (player.shieldTimer / 7) * 30, 4);
        }

        // Hunters
        for (let i = hunters.length-1; i>=0; i--) {
            let h = hunters[i];
            let angle = Math.atan2(player.y - h.y, player.x - h.x);
            h.x += Math.cos(angle) * h.speed; h.y += Math.sin(angle) * h.speed;
            let r = h.radius * (1 + Math.sin(pulseAngle + h.pulseOffset)*0.1);
            ctx.shadowBlur = 30; ctx.shadowColor = "#00ff00";
            ctx.strokeStyle = "#00ff00"; ctx.lineWidth = 5; 
            ctx.beginPath(); ctx.arc(h.x, h.y, r + 5, 0, Math.PI*2); ctx.stroke();
            ctx.shadowBlur = 0; ctx.fillStyle = "#aa0000"; ctx.beginPath(); ctx.arc(h.x, h.y, r, 0, Math.PI*2); ctx.fill();
            if (Math.hypot(player.x-h.x, player.y-h.y) < player.radius+r) { 
                if(!player.isShielded) hit(); hunters.splice(i,1); 
            }
        }

        // Obstacles
        for (let i = obstacles.length-1; i>=0; i--) {
            let o = obstacles[i]; o.x += o.vx; o.y += o.vy;
            let r = o.radius * (1 + Math.sin(pulseAngle + o.pulseOffset)*0.15);
            ctx.shadowBlur = 15; ctx.shadowColor = "#ff0000";
            ctx.fillStyle = "#ff2222";
            ctx.beginPath(); ctx.arc(o.x, o.y, r, 0, Math.PI*2); ctx.fill(); 
            ctx.shadowBlur = 0;
            if (Math.hypot(player.x-o.x, player.y-o.y) < player.radius+r) { 
                if(!player.isShielded) hit(); obstacles.splice(i,1); 
            }
            if (o.x < -100 || o.x > canvas.width+100 || o.y < -100 || o.y > canvas.height+100) { 
                obstacles.splice(i,1); score += 10; 
            }
        }

        // Bonus
        for (let b of bonuses) {
            b.x += b.vx; b.y += b.vy;
            ctx.shadowBlur = 20; ctx.shadowColor = "#ffd700";
            ctx.fillStyle = "#ffd700"; ctx.beginPath(); ctx.arc(b.x, b.y, b.radius, 0, Math.PI*2); ctx.fill();
            ctx.shadowBlur = 0;
        }
        bonuses = bonuses.filter((b) => {
            if (Math.hypot(player.x-b.x, player.y-b.y) < player.radius+b.radius) { 
                player.isShielded = true; player.shieldTimer = 7; return false; 
            }
            return b.y < canvas.height + 50;
        });

        // Supervisor
        for (let i = novas.length-1; i>=0; i--) {
            let n = novas[i]; let a = Math.atan2(n.targetY-n.y, n.targetX-n.x);
            n.x += Math.cos(a)*n.speed; n.y += Math.sin(a)*n.speed;
            ctx.shadowBlur = 20; ctx.shadowColor = "#fff";
            ctx.fillStyle = "white"; ctx.beginPath(); ctx.arc(n.x, n.y, n.radius, 0, Math.PI*2); ctx.fill();
            ctx.shadowBlur = 0;
            if (Math.hypot(n.x-n.targetX, n.y-n.targetY) < 10) { explodeNova(n.x, n.y); novas.splice(i,1); }
            if (Math.hypot(player.x-n.x, player.y-n.y) < player.radius+n.radius) { if(!player.isShielded) hit(); novas.splice(i,1); }
        }

        // Fragments
        for (let i = fragments.length-1; i>=0; i--) {
            let f = fragments[i]; f.x += f.vx; f.y += f.vy;
            ctx.fillStyle = "#00ffff"; ctx.beginPath(); ctx.arc(f.x, f.y, f.radius, 0, Math.PI*2); ctx.fill();
            if (Math.hypot(player.x-f.x, player.y-f.y) < player.radius+f.radius) { if(!player.isShielded) hit(); fragments.splice(i,1); }
            if (f.x < -50 || f.x > canvas.width+50 || f.y < -50 || f.y > canvas.height+50) fragments.splice(i,1);
        }

        document.getElementById('scoreVal').innerText = score;
        animationFrameId = requestAnimationFrame(gameLoop);
    }

    function explodeNova(x, y) {
        let s = 2 + (level * 0.5); 
        for (let i=0; i<10; i++) {
            let a = (Math.PI*2/10)*i;
            fragments.push({ x: x, y: y, vx: Math.cos(a)*s, vy: Math.sin(a)*s, radius: 6 });
        }
    }

    function hit() {
        lives--; 
        document.getElementById('livesVal').innerText = lives;
        if (lives <= 0) endGame();
    }

    function endGame() {
        gameActive = false;
        dangerActive = false;
        clearInterval(gameTimerInterval);
        cancelAnimationFrame(animationFrameId);
        
        document.getElementById('finalScore').innerText = score;
        document.getElementById('game-over').style.display = 'flex';
        
        // Auto Upload
        uploadScore(playerName, score);
    }

    window.addEventListener('resize', resize);
    resize();
</script>
</body>
</html>
