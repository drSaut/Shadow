<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Kopiii Hanum: </title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { width: 100%; height: 100%; overflow: hidden; background: #000; position: fixed; font-family: 'Courier New', monospace; }
        
        #ui { position: absolute; top: 20px; left: 20px; color: #fff; z-index: 10; pointer-events: none; }
        #countdown { 
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            color: #ffeeaa; font-size: 80px; z-index: 5; pointer-events: none; text-shadow: 0 0 20px #ffaa00;
        }

        #splash-screen, #game-over {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 1000; text-align: center;
        }

        h1 { color: #ffeeaa; font-size: 32px; margin-bottom: 10px; letter-spacing: 5px; }
        .instr { color: #888; font-size: 14px; margin-bottom: 20px; padding: 0 20px; line-height: 1.6; }
        
        .btn { 
            background: #ffeeaa; color: #000; padding: 15px 40px; 
            font-size: 20px; font-weight: bold; border-radius: 50px;
            cursor: pointer; z-index: 2000; border: none;
            touch-action: manipulation;
        }

        canvas { display: none; width: 100vw; height: 100vh; touch-action: none; }
    </style>
</head>
<body>

    <div id="ui">
        <div>SCORE: <span id="scoreVal">0</span></div>
        <div>LIVES: <span id="livesVal">3</span></div>
        <div>LEVEL: <span id="levelVal">1</span></div>
    </div>

    <div id="countdown"></div>

    <div id="splash-screen">
        <h1>KOPIII HANUM</h1>
        <p class="instr">
            <span style="color:red">Merah</span>: Musuh Biasa<br>
            <span style="color:#00ffff">Putih</span>: supervisor (1x per level)<br>
             akan meledak di tengah layar! HINDARI MEREKA SELAMA 10 DETIK, UNTUK NAIK KE LEVEL BERIKUTNYA
        </p>
        <button class="btn" id="startBtn">START GAME</button>
    </div>

    <div id="game-over" style="display:none">
        <h1 style="color:red">GAME OVER</h1>
        <p style="color:white; margin-bottom: 20px;">Final Score: <span id="finalScore">0</span></p>
        <button class="btn" onclick="location.reload()">RETRY</button>
    </div>

    <canvas id="gameCanvas"></canvas>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const startBtn = document.getElementById('startBtn');
    const countdownEl = document.getElementById('countdown');
    
    let score = 0, lives = 3, level = 1;
    let gameActive = false, dangerActive = false;
    let player = { x: 0, y: 0, radius: 10 };
    let obstacles = [];
    let novas = [];
    let fragments = [];
    let novaSpawnedInThisLevel = false;

    function startGame() {
        if (gameActive) return;
        document.getElementById('splash-screen').style.display = 'none';
        canvas.style.display = 'block';
        gameActive = true;
        resize();
        player.x = canvas.width / 2;
        player.y = canvas.height / 2;
        gameLoop();
        runSafeStart();
    }

    startBtn.addEventListener('click', startGame);

    function runSafeStart() {
        let count = 3;
        countdownEl.innerText = count;
        let interval = setInterval(() => {
            count--;
            if (count > 0) countdownEl.innerText = count;
            else {
                clearInterval(interval);
                countdownEl.innerText = "GO!";
                setTimeout(() => { 
                    countdownEl.innerText = ""; 
                    dangerActive = true; 
                    spawnObstacle();
                    startLevelTimer();
                }, 800);
            }
        }, 1000);
    }

    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }

    function handleInput(e) {
        if (!gameActive) return;
        const touch = e.touches ? e.touches[0] : e;
        player.x = touch.clientX;
        player.y = touch.clientY - (e.touches ? 120 : 0);
    }

    window.addEventListener('touchmove', (e) => { e.preventDefault(); handleInput(e); }, {passive:false});
    window.addEventListener('mousemove', handleInput);

    function spawnObstacle() {
        if (!gameActive || !dangerActive) return;
        let o = { x: 0, y: 0, size: 20 + Math.random() * 15, vx: 0, vy: 0 };
        let speed = 2.5 + (level * 0.4);
        let side = Math.floor(Math.random() * 4);
        if (side === 0) { o.x = Math.random()*canvas.width; o.y = -30; o.vy = speed; }
        else if (side === 1) { o.x = canvas.width+30; o.y = Math.random()*canvas.height; o.vx = -speed; }
        else if (side === 2) { o.x = Math.random()*canvas.width; o.y = canvas.height+30; o.vy = -speed; }
        else { o.x = -30; o.y = Math.random()*canvas.height; o.vx = speed; }
        obstacles.push(o);
        setTimeout(spawnObstacle, 1000 / (0.8 + level * 0.15));
    }

    // New logic: Only spawn 1 Nova per level (starts level 3)
    function checkNovaSpawn() {
        if (level >= 3 && !novaSpawnedInThisLevel && gameActive) {
            spawnNova();
            novaSpawnedInThisLevel = true;
        }
    }

    function spawnNova() {
        let side = Math.floor(Math.random() * 4);
        let n = {
            x: 0, y: 0, radius: 15,
            targetX: canvas.width / 2,
            targetY: canvas.height / 2,
            speed: 1.5 + (level * 0.3) // Nova movement speed increases with level
        };
        if (side === 0) { n.x = Math.random()*canvas.width; n.y = -20; }
        else if (side === 1) { n.x = canvas.width+20; n.y = Math.random()*canvas.height; }
        else if (side === 2) { n.x = Math.random()*canvas.width; n.y = canvas.height+20; }
        else { n.x = -20; n.y = Math.random()*canvas.height; }
        novas.push(n);
    }

    function explodeNova(x, y) {
        // Fragment speed scales with level
        let fragmentSpeed = 2 + (level * 0.6); 
        for (let i = 0; i < 10; i++) {
            let angle = (Math.PI * 2 / 10) * i;
            fragments.push({
                x: x, y: y,
                vx: Math.cos(angle) * fragmentSpeed,
                vy: Math.sin(angle) * fragmentSpeed,
                radius: 6
            });
        }
    }

    function startLevelTimer() {
        setInterval(() => {
            if (gameActive) {
                level++;
                novaSpawnedInThisLevel = false; // Reset for the new level
                document.getElementById('levelVal').innerText = level;
                checkNovaSpawn();
            }
        }, 10000);
        // Also check immediately for the first level 3 entry
        setInterval(checkNovaSpawn, 1000);
    }

    function drawGlow(x, y, radius, color) {
        let g = ctx.createRadialGradient(x, y, 0, x, y, radius * 3);
        g.addColorStop(0, color);
        g.addColorStop(1, 'transparent');
        ctx.fillStyle = g;
        ctx.beginPath(); ctx.arc(x, y, radius * 3, 0, Math.PI*2); ctx.fill();
    }

    function gameLoop() {
        if (!gameActive) return;
        ctx.fillStyle = "black";
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // Player
        drawGlow(player.x, player.y, 35, 'rgba(255, 230, 100, 0.3)');
        ctx.fillStyle = "#fff";
        ctx.beginPath(); ctx.arc(player.x, player.y, player.radius, 0, Math.PI*2); ctx.fill();

        // Red Boxes
        for (let i = obstacles.length - 1; i >= 0; i--) {
            let o = obstacles[i];
            o.x += o.vx; o.y += o.vy;
            drawGlow(o.x + o.size/2, o.y + o.size/2, o.size, 'rgba(255, 0, 0, 0.4)');
            ctx.fillStyle = "red";
            ctx.fillRect(o.x, o.y, o.size, o.size);
            if (Math.hypot(player.x - (o.x + o.size/2), player.y - (o.y + o.size/2)) < player.radius + o.size/2) {
                hit(); obstacles.splice(i, 1);
            }
            if (o.x < -100 || o.x > canvas.width + 100 || o.y < -100 || o.y > canvas.height + 100) {
                obstacles.splice(i, 1); score += 10;
            }
        }

        // Nova (Mini-Boss)
        for (let i = novas.length - 1; i >= 0; i--) {
            let n = novas[i];
            let angle = Math.atan2(n.targetY - n.y, n.targetX - n.x);
            n.x += Math.cos(angle) * n.speed;
            n.y += Math.sin(angle) * n.speed;
            drawGlow(n.x, n.y, n.radius * 2, 'rgba(0, 230, 255, 0.6)');
            ctx.fillStyle = "white";
            ctx.beginPath(); ctx.arc(n.x, n.y, n.radius, 0, Math.PI*2); ctx.fill();

            if (Math.hypot(n.x - n.targetX, n.y - n.targetY) < 10) {
                explodeNova(n.x, n.y);
                novas.splice(i, 1);
            }
            if (Math.hypot(player.x - n.x, player.y - n.y) < player.radius + n.radius) {
                hit(); novas.splice(i, 1);
            }
        }

        // Fragments (Scaling Speed)
        for (let i = fragments.length - 1; i >= 0; i--) {
            let f = fragments[i];
            f.x += f.vx; f.y += f.vy;
            ctx.shadowBlur = 15; ctx.shadowColor = "#00ffff";
            ctx.fillStyle = "#00ffff";
            ctx.beginPath(); ctx.arc(f.x, f.y, f.radius, 0, Math.PI*2); ctx.fill();
            ctx.shadowBlur = 0;

            if (Math.hypot(player.x - f.x, player.y - f.y) < player.radius + f.radius) {
                hit(); fragments.splice(i, 1);
            }
            if (f.x < -50 || f.x > canvas.width+50 || f.y < -50 || f.y > canvas.height+50) {
                fragments.splice(i, 1);
            }
        }

        document.getElementById('scoreVal').innerText = score;
        requestAnimationFrame(gameLoop);
    }

    function hit() {
        lives--;
        document.getElementById('livesVal').innerText = lives;
        if (lives <= 0) {
            gameActive = false;
            document.getElementById('finalScore').innerText = score;
            document.getElementById('game-over').style.display = 'flex';
        }
    }

    window.addEventListener('resize', resize);
    resize();
</script>
</body>
</html>
